<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- Daisy UI & Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900 display=swap" rel="stylesheet"/>
    <!-- Style Links -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>

  <body class="font-inter">
    <header class="text-white bg-[#15803d]">
      <div class="navbar bg-base-100 bg-[#15803d] container px-5 md:px-0">
        <div class="navbar-start">
          <div class="dropdown ">
            <div tabindex="0" role="button" class="btn btn-ghost pl-0 lg:hidden">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
              </svg>
            </div>
            <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow" >
              <li><a>About</a></li>
              <li><a>Gallery</a></li>
              <li><a>Plant a Tree</a></li>
            </ul>
          </div>
          <a class="btn pl-0 btn-ghost text-xl">Green Earth</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a>About</a></li>
            <li><a>Gallery</a></li>
            <li><a>Plant a Tree</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a href=""><button class="btn border-none rounded-full bg-[#facc15] text-[#15803d]">Plant a Tree</button></a>
        </div>
      </div>
    </header>
    <section class="flex justify-center items-center pt-5 bg-[#CFF0DC]">
      <div class="max-w-[340px]">
        <img src="assets/hero-leaf1.png" alt="">
      </div>
      <div class="text-center">
        <h1 class="text-4xl font-extrabold">Plant a Tree, Grow a Future</h1>
        <p class="my-3">Join our mission to plant 1 million trees and make the Earth greener for future generations.</p>
        <a href=""><button class="btn border-none rounded-full bg-[#facc15] text-[#15803d]">Get Involved</button></a>
      </div>
      <div class="max-w-[340px]">
        <img src="assets/hero-leaf2.png" alt="">
      </div>
    </section>
  </body>
</html>
